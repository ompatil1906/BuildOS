services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-buildos}
      POSTGRES_USER: ${POSTGRES_USER:-buildos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buildos_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - buildos_postgres:/var/lib/postgresql/data
      - ./infra/docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buildos} -d ${POSTGRES_DB:-buildos}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - buildos_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://buildos:buildos_dev_password@postgres:5432/buildos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://buildos:buildos_dev_password@postgres:5432/buildos}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    command: ["python", "-m", "app.workers.worker"]
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-BuildOS}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  buildos_postgres:
  buildos_redis:

